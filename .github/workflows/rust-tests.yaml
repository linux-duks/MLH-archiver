name: "[template] Rust Test"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      project-name:
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  cargo-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test

  cargo-coverage:
    runs-on: ubuntu-latest
    name: Rust Coverage

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage summary
        working-directory: ${{ inputs.path }}
        run: |
          # Generate coverage summary to file and GitHub summary
          echo "## Rust Coverage Summary: ${{ inputs.project-name }}" > coverage-summary.md
          echo "" >> coverage-summary.md
          echo '```' >> coverage-summary.md
          cargo llvm-cov --all-features --summary-only 2>&1 >> coverage-summary.md
          echo '```' >> coverage-summary.md

          # Also append to GitHub Actions summary
          cat coverage-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage summary
        uses: actions/upload-artifact@v7
        with:
          name: coverage-summary-${{ inputs.project-name }}
          path: ${{ inputs.path }}/coverage-summary.md
          if-no-files-found: ignore

      - name: Find Pull Request
        id: find-pr
        run: |
          PR_NUMBER=$(gh api \
            "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].number' \
            2>/dev/null || echo "")

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "pr_number=" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment PR with coverage summary
        if: steps.find-pr.outputs.pr_number != ''
        uses: mshick/add-pr-comment@v3
        with:
          issue: ${{ steps.find-pr.outputs.pr_number }}
          message-path: ${{ inputs.path }}/coverage-summary.md
          message-id: coverage-${{ inputs.project-name }}
          refresh-message-position: true
        continue-on-error: true
