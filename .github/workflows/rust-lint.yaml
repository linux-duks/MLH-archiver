name: "[template] Rust Lint"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      project-name:
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rust-fmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo fmt --check

  rust-clippy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo clippy --all-features --all-targets

  cargo-doc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo doc --all-features --no-deps
