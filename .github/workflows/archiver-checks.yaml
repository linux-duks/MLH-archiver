name: "Archiver: Test and Lint"

on:
  push:
    paths:
    - 'mlh_archiver/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  archiver-tests:
    uses: ./.github/workflows/rust-tests.yaml
    name: archiver-tests
    with:
      path: ./mlh_archiver
      project-name: mlh_archiver

  archiver-lint:
    uses: ./.github/workflows/rust-lint.yaml
    name: archiver-lint
    with:
      path: ./mlh_archiver
      project-name: mlh_archiver
