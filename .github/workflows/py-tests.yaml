name: "[template] Python Test"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      project-name:
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.14"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install NOX
        run: uv tool install nox

      - name: Install the project
        run: cd ${{ inputs.path }}  && uv sync --locked --all-extras --dev

      - name: Run tests with coverage
        run: cd ${{ inputs.path }} && uv tool run nox -s tests

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html-${{ inputs.project-name }}
          path: ${{ inputs.path }}/htmlcov/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload coverage summary
        uses: actions/upload-artifact@v7
        with:
          name: coverage-summary-${{ inputs.project-name }}
          path: ${{ inputs.path }}/coverage-summary.md
          if-no-files-found: ignore

      - name: Find Pull Request
        id: find-pr
        run: |
          PR_NUMBER=$(gh api \
            "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].number' \
            2>/dev/null || echo "")
          
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "pr_number=" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment PR with coverage summary
        if: steps.find-pr.outputs.pr_number != ''
        uses: mshick/add-pr-comment@v3
        with:
          issue: ${{ steps.find-pr.outputs.pr_number }}
          message-path: ${{ inputs.path }}/coverage-summary.md
          message-id: coverage-${{ inputs.project-name }}
          refresh-message-position: true
        continue-on-error: true
