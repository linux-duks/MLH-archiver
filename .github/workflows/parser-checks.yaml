name: "Parser: Test and Lint Parser"

on:
  push:
    paths:
    - 'mlh_parser/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  parser-tests:
    uses: ./.github/workflows/py-tests.yaml
    name: parser-tests
    with:
      path: ./mlh_parser
      project-name: mlh_parser

  parser-lint:
    uses: ./.github/workflows/py-lint.yaml
    with:
      path: ./mlh_parser

