name: Lint and Test Rust Component

on:
  workflow_dispatch:
  push:
    paths:
    - 'mlh-archiver/**'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  # Make sure rustc errors on warnings in the CI
  RUSTFLAGS: -Dwarnings

permissions: read-all

jobs:
  cargo-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test

  rust-fmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo fmt --check

  rust-clippy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo clippy --all-features --all-targets

  cargo-doc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo doc --all-features --no-deps

  cargo-coverage:
    runs-on: ubuntu-latest
    name: Rust Coverage

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools
      
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      
      - name: Generate coverage report
        working-directory: mlh-archiver
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      
      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-mlh-archiver
          path: mlh-archiver/lcov.info
          if-no-files-found: ignore
      
      - name: Upload coverage HTML
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html-mlh-archiver
          path: mlh-archiver/target/llvm-cov/html/
          if-no-files-found: ignore
          retention-days: 7
