  # Email 2: Multipart email with patch and trailers
  -
    group: test.groups.synthetic
    id: synthetic-002-patch-trailers@lists.example.org
    index: 2
    ts: 2012-06-12 01:45:13.00
    head: |
      From: Roy Mustang <mustang@central.mil>
      Subject: [PATCHv6 4/4] Write to config file
      Date: Tue, 12 Jun 2012 01:45:13 +0200
      Message-ID: <20120612014513.Horde.cXfsRXwdC4BP1oMJ5-cA9zA@central.mil>
      In-Reply-To: <vpqmx4bmhem.fsf@bauges.imag.fr>
      References: <1338754481-27012-1-git-send-email@example.org>
      Cc: Riza Hawkeye <hawkeye@central.mil>,
       Alphonse Elric <alphonse@resembool.home>
      To: Cassian Andor <cassian@kenari.fx>
      Xref: localhost test.groups.synthetic:2
    body: |
      From: Roy Mustang <mustang@central.mil>

      Yes, if the XDG file doesn't exist, there is no change.

      Signed-off-by: Roy Mustang <mustang@central.mil>
      Acked-by: Alphonse Elric <alphonse@resembool.home>
      ---
       config.c | 10 ++++++++++
       1 file changed, 10 insertions(+)

      diff --git a/config.c b/config.c
      index 3887873..d36f1d9 100644
      --- a/config.c
      +++ b/config.c
      @@ -296,6 +296,10 @@ static int group_json_set_val(struct accfg_group *group,
       		json_object *jobj, char *key)
       {
       	int rc, i;
      +	struct accfg_device *dev = NULL;
      +
      +	if (group)
      +		dev = accfg_group_get_device(group);

       	if (!group || !jobj || !key)
       		return -EINVAL;

