  # Email 4: Millennium date issue (year typo: 103 instead of 2003)
  -
    group: test.groups.synthetic
    id: synthetic-004-millennium-date@lists.example.org
    index: 4
    ts: 2003-09-29 10:27:42.00
    head: |
      From: "Alexsandr Andert" <alexsandr@ferrix.resistance>
      Subject: Does AGP 8X work in 2.4.x yet?
      Date: Mon, 29 Sep 103 10:34:51 -0400
      Message-id: <3f78415a.43a8.0@ferrix.resistance>
      X-Mailer: CWMail Web to Mail Gateway 2.4e
      Xref: localhost test.groups.synthetic:4
    body: |
      Sorry for butting in, but I've been trying to find the answer
      to this question through other means without much success.

      I have an Asus A7V8X motherboard (VIA Athlon chipset, 333Mhz FSB)
      with an AGP 8X slot on it.

      Does 2.4.x work with AGP 8X?

      AA

