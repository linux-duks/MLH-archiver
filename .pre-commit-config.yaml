repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude:
          glob:
            - "mlh_parser/tests/date_cases/**"
            - "mlh_parser/tests/complete_cases/**"
            - "mlh_parser/tests/synthetic/**"
            - "**/fixtures/**"
            - "**/test_public_inbox/**"
            - "main/**"
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: end-of-file-fixer
        exclude:
          glob:
            - "mlh_parser/tests/date_cases/**"
            - "mlh_parser/tests/complete_cases/**"
            - "mlh_parser/tests/synthetic/**"
            - "**/fixtures/**"
            - "**/test_public_inbox/**"
            - "main/**"
      - id: mixed-line-ending
      - id: check-json
      - id: check-toml
      - id: check-yaml

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt -- --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
