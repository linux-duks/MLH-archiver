name: analysis

services:
  analysis:
    build:
      context: .
      dockerfile: Containerfile
    environment:
      INPUT_DIR: "/input"
    stdin_open: true
    user: "${UID}:${GID}"
    volumes:
      - ./src/:/app/src/
      - ./results/:/app/results/:z
      - ../parser_output/dataset/:/input:z
      - ../anonymizer_output:/anonymousinput:z
    command: uv run python src/make_analysis.py
